<div class="progress">
  @if (label() || showValue()) {
    <div class="progress__header">
      @if (label()) { <span class="progress__label">{{ label() }}</span> }
      @if (showValue()) { <span class="progress__value">{{ pct() }}%</span> }
    </div>
  }
  <div class="progress__track">
    <div
      class="progress__fill"
      [class]="'progress__fill--' + tone()"
      [class.progress__fill--animated]="animated()"
      [style.width.%]="pct()"
    ></div>
  </div>
</div>
