<label class="checkbox" [class.checkbox--disabled]="disabled()">
  <input
    type="checkbox"
    class="checkbox__native"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="onChange($event)"
  />
  <span class="checkbox__box">
    @if (indeterminate()) {
      <span class="checkbox__mark">—</span>
    } @else if (checked()) {
      <span class="checkbox__mark">✓</span>
    }
  </span>
  @if (label()) {
    <span class="checkbox__label">{{ label() }}</span>
  }
</label>
